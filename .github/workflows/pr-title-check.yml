name: PR Title Check

on:
  pull_request:
    types: [opened, edited, synchronize]
    branches: [main, develop]

jobs:
  check-pr-title:
    name: Check PR Title
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title format
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          scopes: |
            vue
            react
            css
            tailwind
            ts
            js
            core
            ci
            deps
          requireScope: false
          subjectPattern: ^[A-Z].+$
          subjectPatternError: |
            The subject must start with a capital letter and not end with a period.
          headerPattern: '^(\w+)(?:\((\w+)\))?: (.+)$'
          headerPatternCorrespondence: type, scope, subject
          validateSingleCommit: true
          validateSingleCommitMatchesPrTitle: true
